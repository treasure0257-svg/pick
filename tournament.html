<!DOCTYPE html>
<html class="light" lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>이상형 월드컵 — The Concierge</title>

<script src="assets/js/config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
<link href="assets/css/app.css" rel="stylesheet" />
</head>
<body class="bg-background text-on-background font-body antialiased min-h-screen flex flex-col">

<!-- Header -->
<header class="bg-surface text-primary font-headline font-semibold tracking-tight sticky top-0 z-50 flex justify-between items-center w-full px-6 py-4">
  <a class="flex items-center gap-3" href="index.html">
    <span class="material-symbols-outlined text-2xl">spa</span>
    <span class="text-xl font-bold tracking-tight">The Concierge</span>
  </a>
  <nav class="hidden md:flex items-center gap-6">
    <a class="text-on-surface-variant hover:bg-surface-container rounded-lg px-3 py-1 transition-colors" href="index.html">홈</a>
    <a class="text-on-surface-variant hover:bg-surface-container rounded-lg px-3 py-1 transition-colors" href="preferences.html">취향 설정</a>
    <a class="text-primary font-bold rounded-lg px-3 py-1" href="tournament.html">토너먼트</a>
    <a class="text-on-surface-variant hover:bg-surface-container rounded-lg px-3 py-1 transition-colors" href="saved.html">저장됨</a>
    <a class="text-on-surface-variant hover:bg-surface-container rounded-lg px-3 py-1 transition-colors" href="profile.html">프로필</a>
  </nav>
  <div data-auth-slot class="flex items-center gap-2"></div>
</header>
<div class="bg-surface-container h-[1px] w-full"></div>

<!-- Main -->
<main class="flex-grow max-w-6xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-10 md:py-14 pb-32 md:pb-14">

  <!-- Screen: setup -->
  <section id="setup-screen">
    <div class="mb-10">
      <span class="font-label text-sm text-on-surface-variant">STEP 1 · 시작하기</span>
      <h1 class="font-headline text-[2.5rem] md:text-[3rem] leading-tight tracking-tight font-extrabold text-on-surface mt-2">
        둘 중 하나만 <span class="text-primary">골라주세요.</span>
      </h1>
      <p class="font-body text-on-surface-variant mt-3 max-w-2xl">
        A와 B, 이미지로 마주하고 감으로 고르세요. 끝까지 가면 오늘의 한 곳이 남습니다.
      </p>
    </div>

    <div class="bg-surface-container-low rounded-[2rem] p-8 md:p-10 mb-8">
      <h2 class="font-headline text-xl font-bold text-on-surface mb-4">카테고리 범위</h2>
      <p class="font-body text-sm text-on-surface-variant mb-6">전체 비교도 가능하고, 특정 카테고리 안에서만 토너먼트도 가능해요.</p>
      <div id="cat-chips" class="flex flex-wrap gap-3"></div>
    </div>

    <div class="bg-surface-container-low rounded-[2rem] p-8 md:p-10 mb-8">
      <h2 class="font-headline text-xl font-bold text-on-surface mb-4">술은?</h2>
      <p class="font-body text-sm text-on-surface-variant mb-6">대진에 포함할 장소 타입을 정해주세요.</p>
      <div id="drinks-chips" class="flex flex-wrap gap-3"></div>
    </div>

    <div class="bg-surface-container-low rounded-[2rem] p-8 md:p-10 mb-8">
      <h2 class="font-headline text-xl font-bold text-on-surface mb-4">대진 규모</h2>
      <div id="size-chips" class="flex flex-wrap gap-3"></div>
    </div>

    <div class="flex justify-end">
      <button id="start-btn" class="inline-flex items-center gap-2 bg-gradient-to-br from-primary to-primary-dim text-on-primary font-body font-semibold py-4 px-10 rounded-xl hover:shadow-[0px_12px_32px_rgba(45,51,53,0.12)] transition-all duration-300 hover:-translate-y-0.5">
        <span class="material-symbols-outlined">play_arrow</span>
        시작하기
      </button>
    </div>
  </section>

  <!-- Screen: match -->
  <section id="match-screen" class="hidden">
    <div class="flex items-center justify-between mb-6">
      <div>
        <p class="font-label text-sm text-on-surface-variant" id="round-label">1R · 8강</p>
        <h2 class="font-headline text-2xl md:text-3xl font-bold text-on-surface mt-1" id="match-label">1 / 4</h2>
      </div>
      <button id="reset-btn" class="text-on-surface-variant hover:bg-surface-container px-3 py-2 rounded-lg inline-flex items-center gap-2">
        <span class="material-symbols-outlined">refresh</span>다시 시작
      </button>
    </div>

    <div class="progress-track mb-10">
      <div id="progress-fill" class="progress-fill" style="width:0%"></div>
    </div>

    <div class="grid md:grid-cols-[1fr,auto,1fr] gap-6 items-center">
      <button id="pick-a" class="card-lift group text-left bg-surface-container-lowest rounded-[2rem] p-0 overflow-hidden min-h-[420px] flex flex-col">
        <div class="relative h-56 md:h-72 overflow-hidden">
          <img id="img-a" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" alt="A" />
        </div>
        <div class="p-6 md:p-8 flex-grow flex flex-col">
          <span class="font-label text-xs text-primary uppercase tracking-widest" id="cat-a"></span>
          <h3 id="name-a" class="font-headline text-2xl font-bold text-on-surface mt-2"></h3>
          <p id="blurb-a" class="font-body text-on-surface-variant mt-2 flex-grow"></p>
          <div class="mt-6 inline-flex items-center gap-2 text-primary font-semibold">
            이걸로 <span class="material-symbols-outlined">arrow_forward</span>
          </div>
        </div>
      </button>

      <div class="flex md:flex-col items-center justify-center gap-4 py-4">
        <div class="bg-surface-container-lowest rounded-full w-14 h-14 flex items-center justify-center font-headline font-extrabold text-primary shadow-[0_8px_24px_rgba(45,51,53,0.05)]">VS</div>
      </div>

      <button id="pick-b" class="card-lift group text-left bg-surface-container-lowest rounded-[2rem] p-0 overflow-hidden min-h-[420px] flex flex-col">
        <div class="relative h-56 md:h-72 overflow-hidden">
          <img id="img-b" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" alt="B" />
        </div>
        <div class="p-6 md:p-8 flex-grow flex flex-col">
          <span class="font-label text-xs text-primary uppercase tracking-widest" id="cat-b"></span>
          <h3 id="name-b" class="font-headline text-2xl font-bold text-on-surface mt-2"></h3>
          <p id="blurb-b" class="font-body text-on-surface-variant mt-2 flex-grow"></p>
          <div class="mt-6 inline-flex items-center gap-2 text-primary font-semibold">
            이걸로 <span class="material-symbols-outlined">arrow_forward</span>
          </div>
        </div>
      </button>
    </div>
  </section>

  <!-- Screen: winner -->
  <section id="winner-screen" class="hidden">
    <div class="text-center mb-10">
      <span class="inline-block bg-secondary-container text-on-secondary-container text-xs font-medium px-3 py-1 rounded-full mb-4">우승</span>
      <h2 class="font-headline text-[2.5rem] md:text-[3.5rem] leading-tight font-extrabold text-on-surface">오늘은 <span class="text-primary">이거예요.</span></h2>
    </div>
    <div class="bg-surface-container-lowest rounded-[2rem] overflow-hidden max-w-3xl mx-auto fade-in">
      <img id="winner-img" class="w-full h-72 md:h-96 object-cover" alt="" />
      <div class="p-8 md:p-12">
        <span id="winner-cat" class="font-label text-xs text-primary uppercase tracking-widest"></span>
        <h3 id="winner-name" class="font-headline text-3xl md:text-4xl font-bold text-on-surface mt-2"></h3>
        <p id="winner-blurb" class="font-body text-on-surface-variant mt-4 text-lg leading-relaxed"></p>
        <div class="flex flex-col sm:flex-row gap-3 mt-10">
          <a id="winner-details" href="#" class="inline-flex items-center justify-center gap-2 bg-gradient-to-br from-primary to-primary-dim text-on-primary font-body font-semibold py-4 px-8 rounded-xl hover:-translate-y-0.5 transition-all duration-300">
            <span class="material-symbols-outlined">map</span>지도에서 보기
          </a>
          <button id="restart-btn" class="inline-flex items-center justify-center gap-2 bg-secondary-container text-on-secondary-container font-body font-semibold py-4 px-8 rounded-xl hover:bg-secondary-fixed-dim transition-colors">
            <span class="material-symbols-outlined">replay</span>다시 돌리기
          </button>
        </div>
      </div>
    </div>
  </section>
</main>

<!-- Mobile bottom nav -->
<nav class="md:hidden bg-surface/80 backdrop-blur-xl text-primary text-[11px] font-label font-medium uppercase tracking-wider fixed bottom-0 left-0 w-full z-50 rounded-t-[1.5rem] shadow-[0px_-4px_24px_rgba(45,51,53,0.04)] flex justify-around items-center px-4 pt-3 pb-6">
  <a class="flex flex-col items-center text-on-surface-variant px-4 py-2" href="index.html">
    <span class="material-symbols-outlined mb-1">home</span><span>홈</span>
  </a>
  <a class="flex flex-col items-center text-on-surface-variant px-4 py-2" href="preferences.html">
    <span class="material-symbols-outlined mb-1">tune</span><span>취향</span>
  </a>
  <a class="flex flex-col items-center text-primary bg-primary/10 rounded-2xl px-4 py-2" href="tournament.html">
    <span class="material-symbols-outlined mb-1" style="font-variation-settings:'FILL' 1;">swords</span><span>토너먼트</span>
  </a>
  <a class="flex flex-col items-center text-on-surface-variant px-4 py-2" href="saved.html">
    <span class="material-symbols-outlined mb-1">bookmark</span><span>저장됨</span>
  </a>
</nav>

<script src="assets/js/firebase-config.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/auth-header.js"></script>
<script src="assets/js/data.js"></script>
<script src="assets/js/app.js"></script>
<script>
  (function () {
    const setupScreen  = document.getElementById("setup-screen");
    const matchScreen  = document.getElementById("match-screen");
    const winnerScreen = document.getElementById("winner-screen");

    const state = {
      categoryId: "all",
      drinks: "flex",
      size: 8,
      bracket: [],
      round: 0,
      matchIndex: 0,
      totalMatches: 0,
      completedMatches: 0
    };

    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // Setup chips
    const catChips = document.getElementById("cat-chips");
    const cats = [{ id: "all", label: "전체", icon: "apps" }, ...PICK_DATA.categories];
    const renderCatChips = () => {
      catChips.innerHTML = cats.map(c => `
        <button type="button" data-id="${c.id}"
          class="chip ${state.categoryId === c.id ? 'is-selected' : ''} font-body text-sm font-medium py-2.5 px-5 rounded-full flex items-center gap-2 focus-ring">
          <span class="material-symbols-outlined text-[18px]">${c.icon}</span>
          <span>${c.label}</span>
        </button>`).join("");
    };
    renderCatChips();
    catChips.addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-id]");
      if (!btn) return;
      state.categoryId = btn.dataset.id;
      renderCatChips();
    });

    const drinksChips = document.getElementById("drinks-chips");
    const renderDrinksChips = () => {
      drinksChips.innerHTML = PICK_DATA.drinks.map(d => `
        <button type="button" data-id="${d.id}"
          class="chip ${state.drinks === d.id ? 'is-selected' : ''} font-body text-sm font-medium py-2.5 px-5 rounded-full flex items-center gap-2 focus-ring">
          <span class="material-symbols-outlined text-[18px]">${d.icon}</span>
          <span>${d.label}</span>
        </button>`).join("");
    };
    renderDrinksChips();
    drinksChips.addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-id]");
      if (!btn) return;
      state.drinks = btn.dataset.id;
      renderDrinksChips();
    });

    const sizeChips = document.getElementById("size-chips");
    const sizes = [4, 8, 16];
    const renderSizeChips = () => {
      sizeChips.innerHTML = sizes.map(s => `
        <button type="button" data-size="${s}"
          class="chip ${state.size === s ? 'is-selected' : ''} font-body text-sm font-medium py-2.5 px-5 rounded-full focus-ring">
          ${s}강
        </button>`).join("");
    };
    renderSizeChips();
    sizeChips.addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-size]");
      if (!btn) return;
      state.size = Number(btn.dataset.size);
      renderSizeChips();
    });

    // Start
    document.getElementById("start-btn").addEventListener("click", () => {
      const pool = PICK_DATA.places.filter(p => {
        if (state.categoryId !== "all" && p.category !== state.categoryId) return false;
        if (state.drinks === "dry"      && p.drinks === "party") return false;
        if (state.drinks === "party"    && p.drinks === "dry")   return false;
        // "optional" and "flex" are permissive.
        return true;
      });
      if (pool.length < state.size) {
        alert(`선택한 범위의 장소가 ${pool.length}개뿐이에요. 더 작은 대진이나 다른 카테고리를 선택해 주세요.`);
        return;
      }
      state.bracket = shuffle(pool).slice(0, state.size);
      state.round = 0;
      state.matchIndex = 0;
      state.completedMatches = 0;
      state.totalMatches = state.size - 1;
      setupScreen.classList.add("hidden");
      winnerScreen.classList.add("hidden");
      matchScreen.classList.remove("hidden");
      renderMatch();
    });

    function roundLabel(size) {
      if (size === 2) return "결승";
      if (size === 4) return "준결승";
      return `${size}강`;
    }

    function updateCard(side, place) {
      document.getElementById("img-" + side).src = place.image;
      document.getElementById("cat-" + side).textContent = (PICK_DATA.categories.find(c => c.id === place.category) || {}).label || "";
      document.getElementById("name-" + side).textContent = place.name;
      document.getElementById("blurb-" + side).textContent = place.blurb;
    }

    function renderMatch() {
      const size = state.bracket.length;
      const matchesThisRound = size / 2;
      document.getElementById("round-label").textContent = `R${state.round + 1} · ${roundLabel(size)}`;
      document.getElementById("match-label").textContent = `${state.matchIndex + 1} / ${matchesThisRound}`;

      const a = state.bracket[state.matchIndex * 2];
      const b = state.bracket[state.matchIndex * 2 + 1];
      updateCard("a", a);
      updateCard("b", b);

      const pct = Math.round((state.completedMatches / state.totalMatches) * 100);
      document.getElementById("progress-fill").style.width = pct + "%";
    }

    function pick(side) {
      const size = state.bracket.length;
      const a = state.bracket[state.matchIndex * 2];
      const b = state.bracket[state.matchIndex * 2 + 1];
      const winner = side === "a" ? a : b;

      state.bracket[state.matchIndex] = winner; // reuse slot logic; we rebuild below

      state.matchIndex++;
      state.completedMatches++;

      const matchesThisRound = size / 2;
      if (state.matchIndex >= matchesThisRound) {
        // Rebuild bracket with winners only
        const winners = [];
        for (let i = 0; i < matchesThisRound; i++) winners.push(state.bracket[i]);
        state.bracket = winners;
        state.round++;
        state.matchIndex = 0;
      }

      if (state.bracket.length === 1) return showWinner(state.bracket[0]);
      renderMatch();
    }

    document.getElementById("pick-a").addEventListener("click", () => pick("a"));
    document.getElementById("pick-b").addEventListener("click", () => pick("b"));
    document.getElementById("reset-btn").addEventListener("click", () => {
      matchScreen.classList.add("hidden");
      setupScreen.classList.remove("hidden");
    });

    function showWinner(winner) {
      PickApp.storage.set(PickApp.keys.tournament, { winnerId: winner.id, ts: Date.now() });
      document.getElementById("winner-img").src = winner.image;
      document.getElementById("winner-cat").textContent = (PICK_DATA.categories.find(c => c.id === winner.category) || {}).label || "";
      document.getElementById("winner-name").textContent = winner.name;
      document.getElementById("winner-blurb").textContent = winner.blurb;
      document.getElementById("winner-details").href = `results.html?place=${winner.id}`;
      matchScreen.classList.add("hidden");
      winnerScreen.classList.remove("hidden");
    }

    document.getElementById("restart-btn").addEventListener("click", () => {
      winnerScreen.classList.add("hidden");
      setupScreen.classList.remove("hidden");
    });
  })();
</script>
</body>
</html>
