<!DOCTYPE html>
<html class="light" lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>저장됨 — The Concierge</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="assets/js/config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
<link href="assets/css/app.css" rel="stylesheet" />
</head>
<body class="bg-background text-on-background font-body antialiased min-h-screen flex flex-col">

<!-- Header -->
<header class="bg-surface text-primary font-headline font-semibold tracking-tight sticky top-0 z-50 flex justify-between items-center w-full px-6 py-4">
  <a class="flex items-center gap-3" href="index.html">
    <span class="material-symbols-outlined text-2xl">spa</span>
    <span class="text-xl font-bold tracking-tight">The Concierge</span>
  </a>
  <nav class="hidden md:flex items-center gap-6">
    <a class="text-on-surface-variant hover:bg-surface-container rounded-lg px-3 py-1 transition-colors" href="index.html">홈</a>
    <a class="text-on-surface-variant hover:bg-surface-container rounded-lg px-3 py-1 transition-colors" href="preferences.html">취향 설정</a>
    <a class="text-on-surface-variant hover:bg-surface-container rounded-lg px-3 py-1 transition-colors" href="tournament.html">토너먼트</a>
    <a class="text-primary font-bold rounded-lg px-3 py-1" href="saved.html">저장됨</a>
    <a class="text-on-surface-variant hover:bg-surface-container rounded-lg px-3 py-1 transition-colors" href="profile.html">프로필</a>
  </nav>
  <div data-auth-slot class="flex items-center gap-2"></div>
</header>
<div class="bg-surface-container h-[1px] w-full"></div>

<main class="flex-grow max-w-6xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-10 md:py-14 pb-32 md:pb-14">

  <div class="mb-10">
    <span class="font-label text-sm text-on-surface-variant">나의 아카이브</span>
    <h1 class="font-headline text-[2.5rem] md:text-[3rem] leading-tight tracking-tight font-extrabold text-on-surface mt-2">
      저장된 <span class="text-primary">장소</span>
    </h1>
    <p class="font-body text-on-surface-variant mt-3 max-w-2xl">마음에 든 추천을 다시 꺼내 보세요. 지도로 열거나 다시 돌려볼 수 있어요.</p>
  </div>

  <div id="saved-grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>

  <div id="empty-state" class="hidden bg-surface-container-low rounded-[2rem] p-12 text-center">
    <span class="material-symbols-outlined text-primary text-5xl">bookmark_border</span>
    <h2 class="font-headline text-2xl font-bold text-on-surface mt-4">아직 저장된 장소가 없어요</h2>
    <p class="font-body text-on-surface-variant mt-2 mb-8">추천 결과에서 '저장' 버튼을 눌러 여기에 모아두세요.</p>
    <a href="preferences.html" class="inline-flex items-center gap-2 bg-gradient-to-br from-primary to-primary-dim text-on-primary font-body font-semibold py-3 px-6 rounded-xl hover:-translate-y-0.5 transition-all">
      <span class="material-symbols-outlined">tune</span>추천 받기
    </a>
  </div>

</main>

<!-- Mobile bottom nav -->
<nav class="md:hidden bg-surface/80 backdrop-blur-xl text-primary text-[11px] font-label font-medium uppercase tracking-wider fixed bottom-0 left-0 w-full z-50 rounded-t-[1.5rem] shadow-[0px_-4px_24px_rgba(45,51,53,0.04)] flex justify-around items-center px-4 pt-3 pb-6">
  <a class="flex flex-col items-center text-on-surface-variant px-4 py-2" href="index.html">
    <span class="material-symbols-outlined mb-1">home</span><span>홈</span>
  </a>
  <a class="flex flex-col items-center text-on-surface-variant px-4 py-2" href="preferences.html">
    <span class="material-symbols-outlined mb-1">tune</span><span>취향</span>
  </a>
  <a class="flex flex-col items-center text-on-surface-variant px-4 py-2" href="tournament.html">
    <span class="material-symbols-outlined mb-1">swords</span><span>토너먼트</span>
  </a>
  <a class="flex flex-col items-center text-primary bg-primary/10 rounded-2xl px-4 py-2" href="saved.html">
    <span class="material-symbols-outlined mb-1" style="font-variation-settings:'FILL' 1;">bookmark</span><span>저장됨</span>
  </a>
</nav>

<script src="assets/js/firebase-config.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/auth-header.js"></script>
<script src="assets/js/data.js"></script>
<script src="assets/js/app.js"></script>
<script>
  (function () {
    const savedIds = PickApp.storage.get(PickApp.keys.saved, []);
    const places = savedIds.map(id => PICK_DATA.places.find(p => p.id === id)).filter(Boolean);

    const grid = document.getElementById("saved-grid");
    const empty = document.getElementById("empty-state");

    if (!places.length) {
      grid.classList.add("hidden");
      empty.classList.remove("hidden");
      return;
    }

    grid.innerHTML = places.map(p => `
      <article class="card-lift bg-surface-container-lowest rounded-2xl overflow-hidden" data-id="${p.id}">
        <img src="${p.image}" alt="" class="w-full h-40 object-cover" />
        <div class="p-5">
          <div class="flex items-center justify-between">
            <span class="font-label text-xs text-primary uppercase tracking-widest">${(PICK_DATA.categories.find(c => c.id === p.category) || {}).label || ""}</span>
            <span class="font-label text-xs text-on-surface-variant">★ ${p.rating}</span>
          </div>
          <h3 class="font-headline text-lg font-bold text-on-surface mt-1">${p.name}</h3>
          <p class="font-body text-sm text-on-surface-variant mt-1">${p.blurb}</p>
          <div class="flex items-center gap-2 mt-4">
            <a href="https://www.google.com/maps/search/?api=1&query=${p.lat},${p.lng}" target="_blank" rel="noopener" class="inline-flex items-center gap-1 text-xs text-primary font-medium hover:underline">
              <span class="material-symbols-outlined text-[18px]">map</span>지도
            </a>
            <button data-action="remove" class="inline-flex items-center gap-1 text-xs text-on-surface-variant hover:text-error ml-auto">
              <span class="material-symbols-outlined text-[18px]">delete</span>삭제
            </button>
          </div>
        </div>
      </article>
    `).join("");

    grid.addEventListener("click", (e) => {
      const removeBtn = e.target.closest("button[data-action='remove']");
      if (!removeBtn) return;
      const card = removeBtn.closest("article[data-id]");
      PickApp.unsavePlace(card.dataset.id);
      card.remove();
      if (!grid.children.length) {
        grid.classList.add("hidden");
        empty.classList.remove("hidden");
      }
    });
  })();
</script>
</body>
</html>
