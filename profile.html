<!DOCTYPE html>
<html class="light" lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>프로필 — The Concierge</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="assets/js/config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
<link href="assets/css/app.css" rel="stylesheet" />
</head>
<body class="bg-background text-on-background font-body antialiased min-h-screen flex flex-col">

<header class="bg-surface text-primary font-headline font-semibold tracking-tight sticky top-0 z-50 flex justify-between items-center w-full px-6 py-4">
  <a class="flex items-center gap-3" href="index.html">
    <span class="material-symbols-outlined text-2xl">spa</span>
    <span class="text-xl font-bold tracking-tight">The Concierge</span>
  </a>
  <nav class="hidden md:flex items-center gap-6">
    <a class="text-on-surface-variant hover:bg-surface-container rounded-lg px-3 py-1 transition-colors" href="index.html">홈</a>
    <a class="text-on-surface-variant hover:bg-surface-container rounded-lg px-3 py-1 transition-colors" href="preferences.html">취향 설정</a>
    <a class="text-on-surface-variant hover:bg-surface-container rounded-lg px-3 py-1 transition-colors" href="tournament.html">토너먼트</a>
    <a class="text-on-surface-variant hover:bg-surface-container rounded-lg px-3 py-1 transition-colors" href="saved.html">저장됨</a>
    <a class="text-primary font-bold rounded-lg px-3 py-1" href="profile.html">프로필</a>
  </nav>
  <div data-auth-slot class="flex items-center gap-2"></div>
</header>
<div class="bg-surface-container h-[1px] w-full"></div>

<main class="flex-grow max-w-4xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-10 md:py-14 pb-32 md:pb-14">

  <div class="mb-10">
    <span class="font-label text-sm text-on-surface-variant">내 프로필</span>
    <h1 class="font-headline text-[2.5rem] md:text-[3rem] leading-tight tracking-tight font-extrabold text-on-surface mt-2">
      나의 <span class="text-primary">리듬</span>
    </h1>
    <p class="font-body text-on-surface-variant mt-3 max-w-2xl">지금까지 설정한 취향과 활동 기록을 한눈에.</p>
  </div>

  <!-- Summary -->
  <section class="bg-surface-container-low rounded-[2rem] p-8 md:p-10 mb-8">
    <div class="flex flex-col sm:flex-row items-start sm:items-center gap-6">
      <div data-auth-avatar class="w-20 h-20 rounded-full bg-gradient-to-br from-primary to-primary-dim text-on-primary flex items-center justify-center font-headline text-3xl font-extrabold overflow-hidden">게</div>
      <div class="flex-grow">
        <h2 data-auth-name class="font-headline text-2xl font-bold text-on-surface">게스트 사용자</h2>
        <p data-auth-email class="font-body text-on-surface-variant">로컬 저장 중</p>
      </div>
      <a data-auth-guest href="login.html" class="bg-gradient-to-br from-primary to-primary-dim text-on-primary font-body font-semibold py-3 px-5 rounded-xl hover:-translate-y-0.5 transition-all duration-300 inline-flex items-center gap-2">
        <span class="material-symbols-outlined text-[18px]">login</span>로그인
      </a>
      <button data-auth-only data-auth-signout class="hidden bg-secondary-container text-on-secondary-container font-body font-semibold py-3 px-5 rounded-xl hover:bg-secondary-fixed-dim transition-colors inline-flex items-center gap-2">
        <span class="material-symbols-outlined text-[18px]">logout</span>로그아웃
      </button>
    </div>
  </section>

  <!-- Preferences snapshot -->
  <section class="bg-surface-container-low rounded-[2rem] p-8 md:p-10 mb-8">
    <div class="flex items-center justify-between mb-6">
      <h2 class="font-headline text-xl font-bold text-on-surface">나의 취향</h2>
      <a href="preferences.html" class="text-primary font-semibold text-sm hover:underline">편집</a>
    </div>
    <div id="prefs-display" class="space-y-4"></div>
  </section>

  <!-- Stats -->
  <section class="grid sm:grid-cols-3 gap-4 mb-8">
    <div class="bg-surface-container-lowest rounded-2xl p-6">
      <p class="font-label text-xs text-on-surface-variant uppercase tracking-widest">저장된 장소</p>
      <p id="stat-saved" class="font-headline text-3xl font-extrabold text-primary mt-2">0</p>
    </div>
    <div class="bg-surface-container-lowest rounded-2xl p-6">
      <p class="font-label text-xs text-on-surface-variant uppercase tracking-widest">토너먼트 기록</p>
      <p id="stat-tournament" class="font-headline text-3xl font-extrabold text-primary mt-2">-</p>
    </div>
    <div class="bg-surface-container-lowest rounded-2xl p-6">
      <p class="font-label text-xs text-on-surface-variant uppercase tracking-widest">선호 카테고리</p>
      <p id="stat-top-cat" class="font-headline text-xl font-bold text-primary mt-2">-</p>
    </div>
  </section>

  <!-- Danger -->
  <section class="bg-surface-container-low rounded-[2rem] p-8 md:p-10">
    <h2 class="font-headline text-xl font-bold text-on-surface mb-2">데이터 초기화</h2>
    <p class="font-body text-sm text-on-surface-variant mb-6">저장된 취향, 저장 목록, 토너먼트 기록을 모두 삭제합니다.</p>
    <button id="reset-btn" class="bg-error/10 text-error font-body font-semibold py-3 px-5 rounded-xl hover:bg-error/20 transition-colors inline-flex items-center gap-2">
      <span class="material-symbols-outlined">delete_forever</span>
      전체 초기화
    </button>
  </section>

</main>

<!-- Mobile bottom nav -->
<nav class="md:hidden bg-surface/80 backdrop-blur-xl text-primary text-[11px] font-label font-medium uppercase tracking-wider fixed bottom-0 left-0 w-full z-50 rounded-t-[1.5rem] shadow-[0px_-4px_24px_rgba(45,51,53,0.04)] flex justify-around items-center px-4 pt-3 pb-6">
  <a class="flex flex-col items-center text-on-surface-variant px-4 py-2" href="index.html">
    <span class="material-symbols-outlined mb-1">home</span><span>홈</span>
  </a>
  <a class="flex flex-col items-center text-on-surface-variant px-4 py-2" href="preferences.html">
    <span class="material-symbols-outlined mb-1">tune</span><span>취향</span>
  </a>
  <a class="flex flex-col items-center text-on-surface-variant px-4 py-2" href="tournament.html">
    <span class="material-symbols-outlined mb-1">swords</span><span>토너먼트</span>
  </a>
  <a class="flex flex-col items-center text-primary bg-primary/10 rounded-2xl px-4 py-2" href="profile.html">
    <span class="material-symbols-outlined mb-1" style="font-variation-settings:'FILL' 1;">person</span><span>프로필</span>
  </a>
</nav>

<script src="assets/js/firebase-config.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/auth-header.js"></script>
<script src="assets/js/data.js"></script>
<script src="assets/js/app.js"></script>
<script>
  (function () {
    const prefs = PickApp.storage.get(PickApp.keys.preferences, {});
    const saved = PickApp.storage.get(PickApp.keys.saved, []);
    const tour  = PickApp.storage.get(PickApp.keys.tournament, null);

    const dis = document.getElementById("prefs-display");

    function tagRow(label, values, map) {
      if (!values || (Array.isArray(values) && !values.length)) {
        return `
          <div>
            <p class="font-label text-xs text-on-surface-variant uppercase tracking-widest mb-2">${label}</p>
            <p class="font-body text-sm text-on-surface-variant">설정되지 않음</p>
          </div>`;
      }
      const arr = Array.isArray(values) ? values : [values];
      const chips = arr.map(v => {
        const item = map.find(x => x.id === v);
        return `<span class="chip is-selected font-body text-sm font-medium py-1.5 px-4 rounded-full inline-flex items-center gap-2">
          ${item?.icon ? `<span class="material-symbols-outlined text-[16px]">${item.icon}</span>` : ""}
          ${item?.label || v}
        </span>`;
      }).join("");
      return `
        <div>
          <p class="font-label text-xs text-on-surface-variant uppercase tracking-widest mb-2">${label}</p>
          <div class="flex flex-wrap gap-2">${chips}</div>
        </div>`;
    }

    dis.innerHTML = [
      tagRow("카테고리", prefs.categories, PICK_DATA.categories),
      tagRow("분위기",   prefs.moods,      PICK_DATA.moods),
      tagRow("예산",     prefs.budget,     PICK_DATA.budgets),
      tagRow("시간",     prefs.duration,   PICK_DATA.durations),
      tagRow("술",       prefs.drinks,     PICK_DATA.drinks),
      prefs.note ? `
        <div>
          <p class="font-label text-xs text-on-surface-variant uppercase tracking-widest mb-2">메모</p>
          <div class="bg-surface-variant rounded-xl p-4">
            <p class="font-body text-sm text-on-surface leading-relaxed">${prefs.note.replace(/</g, "&lt;")}</p>
          </div>
        </div>` : ""
    ].join("");

    document.getElementById("stat-saved").textContent = saved.length;
    if (tour) {
      const winner = PICK_DATA.places.find(p => p.id === tour.winnerId);
      document.getElementById("stat-tournament").textContent = winner ? winner.name : "-";
    }
    if (prefs.categories?.length) {
      const first = PICK_DATA.categories.find(c => c.id === prefs.categories[0]);
      document.getElementById("stat-top-cat").textContent = first?.label || "-";
    }

    document.getElementById("reset-btn").addEventListener("click", () => {
      if (!confirm("저장된 모든 데이터를 삭제할까요?")) return;
      Object.values(PickApp.keys).forEach(k => localStorage.removeItem(k));
      location.reload();
    });
  })();
</script>
</body>
</html>
