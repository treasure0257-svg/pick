<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Preference Input - The Concierge</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary": "#f9f8ff",
                        "surface-container-high": "#e5e9eb",
                        "on-primary-container": "#1e5469",
                        "on-secondary-fixed": "#264350",
                        "surface-container-lowest": "#ffffff",
                        "surface-bright": "#f8f9fa",
                        "on-primary-fixed": "#004155",
                        "on-primary-fixed-variant": "#2a5e73",
                        "primary-container": "#b1e4fd",
                        "primary": "#32657a",
                        "surface-dim": "#d5dbdd",
                        "tertiary-fixed-dim": "#b1c0ec",
                        "tertiary-fixed": "#becefa",
                        "surface-container": "#ebeef0",
                        "on-error": "#fff7f6",
                        "on-surface": "#2d3335",
                        "on-tertiary-fixed-variant": "#3f4e73",
                        "on-secondary": "#f3faff",
                        "error-dim": "#67040d",
                        "inverse-on-surface": "#9b9d9e",
                        "primary-fixed": "#b1e4fd",
                        "surface-variant": "#dee3e6",
                        "background": "#f8f9fa",
                        "tertiary-dim": "#435278",
                        "surface-container-low": "#f1f4f5",
                        "secondary-fixed-dim": "#bbd9e9",
                        "primary-fixed-dim": "#a4d6ef",
                        "tertiary-container": "#becefa",
                        "primary-dim": "#24596e",
                        "secondary": "#466370",
                        "on-tertiary-container": "#354569",
                        "error": "#a83836",
                        "secondary-container": "#c9e7f7",
                        "surface-tint": "#32657a",
                        "on-error-container": "#6e0a12",
                        "tertiary": "#4f5e84",
                        "outline": "#767c7e",
                        "on-primary": "#f3faff",
                        "inverse-surface": "#0c0f10",
                        "surface-container-highest": "#dee3e6",
                        "secondary-dim": "#3a5764",
                        "on-tertiary-fixed": "#213155",
                        "inverse-primary": "#b1e4fd",
                        "error-container": "#fa746f",
                        "on-background": "#2d3335",
                        "outline-variant": "#adb3b5",
                        "secondary-fixed": "#c9e7f7",
                        "surface": "#f8f9fa",
                        "on-secondary-fixed-variant": "#435f6d",
                        "on-surface-variant": "#5a6062",
                        "on-secondary-container": "#395663"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {},
                    "fontFamily": {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-background text-on-background font-body antialiased min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-[#f8f9fa] dark:bg-[#1a1c1e] text-[#32657a] dark:text-[#a4d6ef] font-['Manrope'] font-semibold tracking-tight text-[#2d3335] dark:text-[#e1e2e4] docked full-width top-0 z-50 flat no-shadows flex justify-between items-center w-full px-6 py-4 max-w-full">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-2xl" data-icon="spa">spa</span>
<span class="text-xl font-bold tracking-tight text-[#32657a] dark:text-[#a4d6ef]">The Concierge</span>
</div>
<div class="flex items-center gap-4 hidden md:flex">
<nav class="flex gap-6">
<a class="text-[#5a6062] dark:text-[#8e9193] hover:bg-[#ebeef0] dark:hover:bg-[#33393b] transition-colors rounded-lg px-3 py-1" href="#">탐색</a>
<a class="text-[#32657a] dark:text-[#a4d6ef] font-bold hover:bg-[#ebeef0] dark:hover:bg-[#33393b] transition-colors rounded-lg px-3 py-1" href="#">취향 설정</a>
<a class="text-[#5a6062] dark:text-[#8e9193] hover:bg-[#ebeef0] dark:hover:bg-[#33393b] transition-colors rounded-lg px-3 py-1" href="#">저장됨</a>
<a class="text-[#5a6062] dark:text-[#8e9193] hover:bg-[#ebeef0] dark:hover:bg-[#33393b] transition-colors rounded-lg px-3 py-1" href="#">프로필</a>
</nav>
</div>
<div class="flex items-center gap-4">
<button class="scale-95 active:scale-90 transition-transform duration-200 text-[#32657a] dark:text-[#a4d6ef] hover:bg-[#ebeef0] dark:hover:bg-[#33393b] p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
<button class="scale-95 active:scale-90 transition-transform duration-200 text-[#32657a] dark:text-[#a4d6ef] hover:bg-[#ebeef0] dark:hover:bg-[#33393b] p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
</button>
</div>
</header>
<div class="bg-[#ebeef0] dark:bg-[#2d3133] h-[1px] w-full"></div>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col md:flex-row max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-12 md:py-20 gap-12 relative z-10 pb-32 md:pb-12">
<!-- Left Editorial Section -->
<div class="w-full md:w-5/12 flex flex-col justify-center sticky top-24 self-start">
<div class="absolute inset-0 bg-primary-fixed-dim/20 blur-3xl rounded-full -z-10 w-3/4 h-3/4 left-1/2 -translate-x-1/2 top-1/2 -translate-y-1/2"></div>
<h1 class="font-headline text-[3.5rem] leading-[1.1] tracking-[-0.02em] font-extrabold text-on-surface mb-6">
                당신만의 완벽한 <br/> <span class="text-primary">휴식을 디자인하세요.</span>
</h1>
<p class="font-body text-lg text-on-surface-variant mb-10 max-w-md leading-relaxed">
                당신이 어떻게 쉬고 싶은지 알려주세요. 당신의 리듬에 딱 맞는 경험을 설계해 드립니다.
            </p>
<div class="hidden md:block">
<img alt="Relaxing scene" class="rounded-[2rem] w-full h-64 object-cover opacity-90 mix-blend-multiply filter grayscale-[20%]" data-alt="a person relaxing on a comfortable lounge chair reading a book in a sunlit modern room with soft neutral tones and large windows" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBZuGzlT6NkIreS7ezm1WwMe1Ansv2lXcw-iS34LAx3oethFK81UKR05aT-Gm4TNIYgAVRgwXHMOu4agA8qDg2l75XGeCoEVh-t25AKeWQDTz2xugvu6eX19e-t4A5r68aZPw7t3RJUoHDttRzMymNVIhwa_Qq3-zKfSwgLmPo1SBciemuqy86fo43QwvUwrlHtuNPRHWlfweaGIyxiLQG-s3__jRfGsyEHIiYCTTsCsqbUdgkgFAx_6Ozbsg5fd2dcYVGMSdx-Qng"/>
</div>
</div>
<!-- Right Input Section -->
<div class="w-full md:w-7/12 flex flex-col gap-10">
<!-- Text Area Input -->
<section class="bg-surface-container-low rounded-[2rem] p-8 md:p-10 relative overflow-hidden group">
<div class="absolute top-0 right-0 w-32 h-32 bg-secondary-container/30 rounded-full blur-2xl -mr-10 -mt-10 transition-transform duration-700 group-hover:scale-150"></div>
<label class="block font-headline text-2xl font-bold text-on-surface mb-4 relative z-10" for="ideal-weekend">
                    이상적인 주말
                </label>
<p class="font-body text-sm text-on-surface-variant mb-6 relative z-10">
                    당신이 꿈꾸는 완벽한 이틀을 설명해 주세요. 하이킹을 하고 싶으신가요, 갤러리를 구경하고 싶으신가요, 아니면 커피와 함께 느긋한 아침을 즐기고 싶으신가요?
                </p>
<div class="relative z-10">
<textarea class="w-full bg-surface-container-highest border-0 rounded-xl p-5 font-body text-on-surface focus:ring-2 focus:ring-primary/40 focus:bg-surface-container-lowest transition-colors resize-none placeholder:text-on-surface-variant/50" id="ideal-weekend" name="ideal-weekend" placeholder="나의 토요일은 대게 이렇게 시작합니다..." rows="5"></textarea>
</div>
</section>
<!-- Tags/Chips Section -->
<section class="bg-surface-container-low rounded-[2rem] p-8 md:p-10">
<h2 class="font-headline text-2xl font-bold text-on-surface mb-2">분위기 및 스타일</h2>
<p class="font-body text-sm text-on-surface-variant mb-8">
                    당신의 여가 시간을 구성하는 요소들을 선택해 주세요.
                </p>
<div class="flex flex-wrap gap-3">
<!-- Chip: Active -->
<button class="bg-surface-container-highest hover:bg-surface-variant text-on-surface font-body text-sm font-medium py-2.5 px-5 rounded-full transition-colors flex items-center gap-2 border border-transparent focus:outline-none focus:ring-2 focus:ring-primary/40 focus:bg-surface-container-lowest">
<span class="material-symbols-outlined text-[18px]" data-icon="directions_run">directions_run</span>
                        활동적
                    </button>
<!-- Chip: Relaxing (Selected state simulation) -->
<button class="bg-tertiary-container text-on-tertiary-container font-body text-sm font-medium py-2.5 px-5 rounded-full transition-colors flex items-center gap-2 border border-transparent focus:outline-none focus:ring-2 focus:ring-primary/40 shadow-[0_4px_12px_rgba(45,51,53,0.08)]">
<span class="material-symbols-outlined text-[18px]" data-icon="self_improvement">self_improvement</span>
                        휴식
                    </button>
<!-- Chip: Nature -->
<button class="bg-surface-container-highest hover:bg-surface-variant text-on-surface font-body text-sm font-medium py-2.5 px-5 rounded-full transition-colors flex items-center gap-2 border border-transparent focus:outline-none focus:ring-2 focus:ring-primary/40 focus:bg-surface-container-lowest">
<span class="material-symbols-outlined text-[18px]" data-icon="park">park</span>
                        자연
                    </button>
<!-- Chip: City -->
<button class="bg-surface-container-highest hover:bg-surface-variant text-on-surface font-body text-sm font-medium py-2.5 px-5 rounded-full transition-colors flex items-center gap-2 border border-transparent focus:outline-none focus:ring-2 focus:ring-primary/40 focus:bg-surface-container-lowest">
<span class="material-symbols-outlined text-[18px]" data-icon="location_city">location_city</span>
                        도시
                    </button>
<!-- Chip: Foodie (Selected state simulation) -->
<button class="bg-tertiary-container text-on-tertiary-container font-body text-sm font-medium py-2.5 px-5 rounded-full transition-colors flex items-center gap-2 border border-transparent focus:outline-none focus:ring-2 focus:ring-primary/40 shadow-[0_4px_12px_rgba(45,51,53,0.08)]">
<span class="material-symbols-outlined text-[18px]" data-icon="restaurant">restaurant</span>
                        맛집
                    </button>
<!-- Chip: Solo -->
<button class="bg-surface-container-highest hover:bg-surface-variant text-on-surface font-body text-sm font-medium py-2.5 px-5 rounded-full transition-colors flex items-center gap-2 border border-transparent focus:outline-none focus:ring-2 focus:ring-primary/40 focus:bg-surface-container-lowest">
<span class="material-symbols-outlined text-[18px]" data-icon="person">person</span>
                        혼자
                    </button>
<!-- Chip: With Friends -->
<button class="bg-surface-container-highest hover:bg-surface-variant text-on-surface font-body text-sm font-medium py-2.5 px-5 rounded-full transition-colors flex items-center gap-2 border border-transparent focus:outline-none focus:ring-2 focus:ring-primary/40 focus:bg-surface-container-lowest">
<span class="material-symbols-outlined text-[18px]" data-icon="groups">groups</span>
                        친구와 함께
                    </button>
</div>
</section>
<!-- Action Area -->
<div class="flex justify-end pt-4">
<button class="bg-gradient-to-br from-primary to-primary-dim text-on-primary font-body font-semibold py-4 px-10 rounded-xl hover:shadow-[0px_12px_32px_rgba(45,51,53,0.12)] transition-all duration-300 transform hover:-translate-y-1">
                    취향 저장하기
                </button>
</div>
</div>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="md:hidden bg-[#f8f9fa]/80 dark:bg-[#1a1c1e]/80 backdrop-blur-xl text-[#32657a] dark:text-[#a4d6ef] text-[11px] font-['Inter'] font-medium uppercase tracking-wider fixed bottom-0 w-full z-50 rounded-t-[1.5rem] shadow-[0px_-4px_24px_rgba(45,51,53,0.04)] fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pt-3 pb-8">
<div class="absolute top-0 left-0 w-full border-t-[0.5px] border-[#adb3b5]/15"></div>
<a class="flex flex-col items-center justify-center text-[#5a6062] dark:text-[#8e9193] px-5 py-2 hover:text-[#32657a] dark:hover:text-[#a4d6ef] active:scale-95 transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined mb-1" data-icon="explore">explore</span>
<span>탐색</span>
</a>
<a class="flex flex-col items-center justify-center text-[#32657a] dark:text-[#a4d6ef] bg-[#32657a]/10 rounded-2xl px-5 py-2 hover:text-[#32657a] dark:hover:text-[#a4d6ef] active:scale-95 transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined mb-1" data-icon="tune" style="font-variation-settings: 'FILL' 1;">tune</span>
<span>취향 설정</span>
</a>
<a class="flex flex-col items-center justify-center text-[#5a6062] dark:text-[#8e9193] px-5 py-2 hover:text-[#32657a] dark:hover:text-[#a4d6ef] active:scale-95 transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined mb-1" data-icon="bookmark">bookmark</span>
<span>저장됨</span>
</a>
<a class="flex flex-col items-center justify-center text-[#5a6062] dark:text-[#8e9193] px-5 py-2 hover:text-[#32657a] dark:hover:text-[#a4d6ef] active:scale-95 transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span>프로필</span>
</a>
</nav>
</body></html>
