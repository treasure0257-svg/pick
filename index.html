    "operatingSystem": "Web",
    "inLanguage": "ko-KR",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "KRW" },
    "image": "https://pick-concierge.web.app/og-image.jpg",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://pick-concierge.web.app/#/results?q={search_term_string}",
      "query-input": "required name=search_term_string"
    },
    "publisher": {
      "@type": "Organization",

      "logo": { "@type": "ImageObject", "url": "https://pick-concierge.web.app/logo.png" }
